[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["firebase-admin", "@firebase/app", "@google-cloud/firestore", "@netlify/blobs"]
  included_files = ["netlify/functions/node_modules/**"]

# About page permanently removed — 301 to home at the edge (no flash, de-indexes).
[[redirects]]
  from = "/about"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/about/*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/tour-dashboard"
  to = "/tour-dashboard/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/tour-dashboard/*"
  to = "/tour-dashboard/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/artists/*"
  to = "/artist.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/tour-planner"
  to = "/tour-planner/index.html"
  status = 200


[[redirects]]
  from = "/band-app"
  to = "/band-app/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/band-app/*"
  to = "/band-app/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/advancing"
  to = "/advancing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/advancing/*"
  to = "/advancing/index.html"
  status = 200
  force = true

[[headers]]
  for = "/about"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/about/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"

[[redirects]]
  from = "/band-app"
  to = "/band-app/index.html"
  status = 200

[[redirects]]
  from = "/band-app/*"
  to = "/band-app/index.html"
  status = 200

[[redirects]]
  from = "/advancing/*"
  to = "/advancing/index.html"
  status = 200
