<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Import Melankolia Admin Data</title><style>body{margin:0;background:#050505;color:#f5f5f5;font-family:Arial,sans-serif;padding:32px}main{max-width:900px;margin:auto}.card{border:1px solid #242424;background:#101010;padding:24px}h1{font-size:22px;margin:0 0 12px}p{color:#aaa;line-height:1.5}textarea{width:100%;min-height:300px;background:#000;color:#ddd;border:1px solid #333;padding:12px;font-family:monospace;font-size:12px}button,a.btn{background:#c8a96e;color:#000;border:0;padding:12px 18px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-decoration:none;display:inline-block;margin:10px 8px 10px 0}.danger{background:#2a1111;color:#ffb3b3}.muted{font-size:12px;color:#777}</style></head><body><main><div class="card"><h1>Import Melankolia Admin Data</h1><p>Paste the export from the old domain here. This merges records by artist slug/video URL and preserves any newer videos already added on this domain.</p><textarea id="in" placeholder="Paste export JSON here…"></textarea><button id="importBtn">Merge Import</button><a class="btn" href="/admin/">Open Admin</a><p class="muted" id="status"></p></div></main><script>
function parseArr(s){try{const v=JSON.parse(s||'[]');return Array.isArray(v)?v:[]}catch(e){return[]}}
function parseObj(s){try{return JSON.parse(s||'{}')||{}}catch(e){return{}}}
function keyUrl(v){return String((v&&v.url)||v||'').trim().toLowerCase()}
function mergeUniqueByUrl(a,b){const out=[];const seen=new Set();[...(a||[]),...(b||[])].forEach(x=>{const u=keyUrl(x);if(!u||seen.has(u))return;seen.add(u);out.push(x)});return out}
function mergeDiscog(a,b){const out=[];const seen=new Set();[...(a||[]),...(b||[])].forEach(x=>{const k=String((x&&x.mbid)||((x&&x.title)||'')+'|'+((x&&x.year)||'')).toLowerCase();if(!k||seen.has(k))return;seen.add(k);out.push(x)});return out}
function richMergeArtist(imported,current){const merged={...(current||{})};Object.keys(imported||{}).forEach(k=>{const v=imported[k];if(v===undefined||v===null)return;if(Array.isArray(v)){ if(k==='videos') merged[k]=mergeUniqueByUrl(v,merged[k]); else if(k==='discography') merged[k]=mergeDiscog(v,merged[k]); else merged[k]=[...new Set([...(v||[]),...((merged[k]||[]))])]; } else if(typeof v==='object'){ merged[k]={...(merged[k]||{}),...v}; } else if(String(v).trim()!=='' || merged[k]===undefined){ merged[k]=v; }});return merged}
function mergeVideos(imported,current){const out=[];const seen=new Set();[...(imported||[]),...(current||[])].forEach(v=>{const u=keyUrl(v);if(!u||seen.has(u))return;seen.add(u);out.push(v)});return out.map((v,i)=>({...v,order:i}))}
document.getElementById('importBtn').onclick=()=>{try{const payload=JSON.parse(document.getElementById('in').value.trim());const data=payload.data||payload;const importedArtists=parseArr(data.mk_artists);const currentArtists=parseArr(localStorage.getItem('mk_artists'));const bySlug=new Map(currentArtists.map(a=>[a.slug||a.id,a]));importedArtists.forEach(a=>{const k=a.slug||a.id;bySlug.set(k,richMergeArtist(a,bySlug.get(k)))});const mergedArtists=[...bySlug.values()];const importedVideos=parseArr(data.mk_videos);const currentVideos=parseArr(localStorage.getItem('mk_videos'));localStorage.setItem('mk_artists',JSON.stringify(mergedArtists));localStorage.setItem('mk_videos',JSON.stringify(mergeVideos(importedVideos,currentVideos)));localStorage.setItem('mk_data_version',data.mk_data_version||localStorage.getItem('mk_data_version')||'15');document.getElementById('status').textContent='Imported '+mergedArtists.length+' artists and '+parseArr(localStorage.getItem('mk_videos')).length+' videos. Open /admin/ and refresh.'}catch(e){document.getElementById('status').textContent='Import failed: '+e.message}}</script></body></html>
