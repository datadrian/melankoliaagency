<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Export Melankolia Admin Data</title><style>body{margin:0;background:#050505;color:#f5f5f5;font-family:Arial,sans-serif;padding:32px}main{max-width:900px;margin:auto}.card{border:1px solid #242424;background:#101010;padding:24px}h1{font-size:22px;margin:0 0 12px}p{color:#aaa;line-height:1.5}textarea{width:100%;min-height:300px;background:#000;color:#ddd;border:1px solid #333;padding:12px;font-family:monospace;font-size:12px}button,a.btn{background:#c8a96e;color:#000;border:0;padding:12px 18px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;text-decoration:none;display:inline-block;margin:10px 8px 10px 0}.muted{font-size:12px;color:#777}</style></head><body><main><div class="card"><h1>Export Melankolia Admin Data</h1><p>This reads the admin data saved in this browser/domain and creates a migration backup. Copy the full text below, then open the import page on <strong>melankoliaagency.com</strong>.</p><button id="copyBtn">Copy Export</button><a class='btn' href='https://melankoliaagency.com/admin/import' target='_blank'>Open Import Page</a><textarea id="out" readonly></textarea><p class="muted" id="status"></p></div></main><script>(function(){const keys=['mk_artists','mk_videos','mk_data_version','mk_bookings'];const payload={type:'melankolia-admin-export',version:1,origin:location.origin,exportedAt:new Date().toISOString(),data:{}};keys.forEach(k=>payload.data[k]=localStorage.getItem(k)||'');const text=JSON.stringify(payload);const out=document.getElementById('out');out.value=text;document.getElementById('status').textContent='Export size: '+Math.round(text.length/1024)+' KB from '+location.origin;document.getElementById('copyBtn').onclick=async()=>{out.select();try{await navigator.clipboard.writeText(out.value);document.getElementById('status').textContent='Copied. Now paste it into the import page on melankoliaagency.com.'}catch(e){document.execCommand('copy');document.getElementById('status').textContent='Copied.'}}})();</script></body></html>
