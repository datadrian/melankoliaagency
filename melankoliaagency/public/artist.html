<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Booking | Melankolia Agency</title>
  <meta name="description" content="Artist bio, media, videos and booking information for Melankolia Agency roster artists.">
  <link rel="canonical" href="https://www.melankoliaagency.com/artists/">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta property="og:site_name" content="Melankolia Agency">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Artist Booking | Melankolia Agency">
  <meta property="og:description" content="Artist bio, media, videos and booking information for Melankolia Agency roster artists.">
  <meta property="og:url" content="https://www.melankoliaagency.com/artists/">
  <meta property="og:image" content="https://www.melankoliaagency.com/images/logo-full.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Artist Booking | Melankolia Agency">
  <meta name="twitter:description" content="Artist bio, media, videos and booking information for Melankolia Agency roster artists.">
  <meta name="twitter:image" content="https://www.melankoliaagency.com/images/logo-full.png">
  <link rel="icon" type="image/png" href="/images/logo-full.png">
  <link rel="apple-touch-icon" href="/images/logo-full.png">
  <link rel="stylesheet" href="/css/main.css?v=profile-page-edit-v1">
  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "Organization", "name": "Melankolia Agency", "url": "https://www.melankoliaagency.com", "logo": "https://www.melankoliaagency.com/images/logo-full.png", "email": "booking@melankoliaagency.com", "description": "Boutique music booking agency representing darkwave, post-punk, EBM, industrial, dark techno, shoegaze, dream pop and underground electronic artists."}</script>
</head>
<body>
  <!-- NAV -->
  <nav class="nav" id="nav">
    <a href="/" class="nav-logo">
      <img src="/images/logo-mark-white.svg" alt="Melankolia Agency" class="nav-logo-img">
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="nav-link">Artists</a></li>
      <li><a href="/about/" class="nav-link">About</a></li>
      <li><a class='nav-link' href='/videos'>Videos</a></li>
      <li><a class='nav-link' href='/booking'>Booking</a></li>
      <li><a class='nav-link' href='/submission'>Submit</a></li>
    </ul>
  </nav>

  <!-- ARTIST HERO -->
  <div class="artist-hero" id="artistHero">
    <div class="artist-hero-bg" id="artistHeroBg"></div>
    <div class="artist-hero-overlay"></div>
    <div class="artist-hero-content">
      <a href="/" class="back-link">← All Artists</a>
      <h1 class="artist-hero-name" id="artistName">Loading...</h1>
      <div class="artist-meta" id="artistMeta"></div>
    </div>
  </div>

  <!-- ARTIST CONTENT -->
  <main class="artist-content" id="artistContent">
    <div class="artist-layout">

      <!-- LEFT COL: photo + socials + book -->
      <div class="artist-photo-col">
        <img class="artist-photo" id="artistPhoto" src="" alt="">
        <div class="artist-social" id="artistSocial"></div>
        <!-- Spotify Player -->
        <div id="artistSpotifyPlayer" style="display:none; margin-bottom:1.5rem"></div>
        <a class='btn-book' href='/booking' id='bookBtn'>Book This Artist</a>
      </div>

      <!-- RIGHT COL: bio + stats + quotes + discog + videos -->
      <div class="artist-bio-col">
        <p class="artist-short-bio" id="artistShortBio"></p>
        <div class="artist-bio" id="artistBio"></div>

        <!-- LIVE STATS -->
        <div class="artist-stats" id="artistStats"></div>

        <!-- PRESS QUOTES -->
        <div class="artist-quotes" id="artistQuotes"></div>

        <!-- DISCOGRAPHY -->
        <div class="artist-discography" id="artistDiscography"></div>

        <!-- VIDEOS -->
        <div class="artist-videos" id="artistVideos"></div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-inner">
      <img src="/melankoliaagencylogoonlysvgWHITE.svg" alt="Melankolia Agency" class="footer-logo"
           onerror="this.src='/images/logo-mark-white.svg'">
      <div class="footer-links">
        <a href="mailto:booking@melankoliaagency.com">booking@melankoliaagency.com</a>
      </div>
      <p class="footer-copy">&copy; 2025 Melankolia Agency. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/data.js"></script>
  <script src="/js/artist.js?v=logo-strip-v21"></script>
</body>
</html>
