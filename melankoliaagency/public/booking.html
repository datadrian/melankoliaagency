<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking — Melankolia Agency</title>
  <meta name="description" content="Submit a booking request for Melankolia Agency artists.">
  <link rel="icon" type="image/png" href="/images/logo-full.png">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <nav class="nav" id="nav">
    <a href="/" class="nav-logo">
      <img src="/images/logo-full.png" alt="Melankolia Agency" class="nav-logo-img">
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="/" class="nav-link">Artists</a></li>
      <li><a href="/videos.html" class="nav-link">Videos</a></li>
      <li><a href="/booking.html" class="nav-link active">Booking</a></li>
      <li><a href="/submission.html" class="nav-link">Submit</a></li>
    </ul>
  </nav>

  <div class="page-hero">
    <h1 class="page-title">Booking Request</h1>
    <p class="page-sub">Fill in the details below and our team will get back to you within 48 hours.</p>
  </div>

  <main class="form-section">
    <form class="booking-form" id="bookingForm" netlify>
      <input type="hidden" name="form-name" value="booking">

      <div class="form-row">
        <div class="form-group">
          <label>Artist(s) of Interest *</label>
          <select name="artist" class="form-input" required>
            <option value="">Select an artist...</option>
            <!-- Populated by JS -->
          </select>
        </div>
        <div class="form-group">
          <label>Event Type *</label>
          <select name="event_type" class="form-input" required>
            <option value="">Select type...</option>
            <option>Club Night</option>
            <option>Festival</option>
            <option>Private Event</option>
            <option>Concert</option>
            <option>Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Event Date *</label>
          <input type="date" name="event_date" class="form-input" required>
        </div>
        <div class="form-group">
          <label>Budget (USD) *</label>
          <input type="text" name="budget" class="form-input" placeholder="e.g. $500–$1500" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Venue Name *</label>
          <input type="text" name="venue" class="form-input" placeholder="Venue name" required>
        </div>
        <div class="form-group">
          <label>Venue City / Country *</label>
          <input type="text" name="location" class="form-input" placeholder="City, Country" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Your Name *</label>
          <input type="text" name="name" class="form-input" placeholder="Full name" required>
        </div>
        <div class="form-group">
          <label>Your Email *</label>
          <input type="email" name="email" class="form-input" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="form-group full">
        <label>Message to Agent</label>
        <textarea name="message" class="form-input form-textarea" placeholder="Tell us more about your event, technical requirements, or any special requests..."></textarea>
      </div>

      <button type="submit" class="btn-submit">Send Booking Request</button>

      <div class="form-success" id="formSuccess" style="display:none;">
        <p>Thanks! We'll be in touch within 48 hours.</p>
      </div>
    </form>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <img src="/images/logo-full.png" alt="Melankolia Agency" class="footer-logo">
      <div class="footer-links">
        <a href="mailto:booking@melankoliaagency.com">booking@melankoliaagency.com</a>
      </div>
      <p class="footer-copy">&copy; 2025 Melankolia Agency. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/data.js"></script>
  <script src="/js/booking.js"></script>
</body>
</html>
