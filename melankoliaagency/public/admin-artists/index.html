<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artist Manager — Melankolia Agency</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/images/logo-full.png">
  <style>
    :root { --bg:#0a0a0a; --panel:#121212; --panel2:#171717; --border:#262626; --text:#eee; --muted:#888; --gold:#c8a96e; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; font-size:14px; }
    a { color:var(--gold); }
    .topbar { display:flex; align-items:center; gap:14px; padding:12px 18px; background:var(--panel); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; }
    .topbar img { height:26px; }
    .topbar .title { font-size:13px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
    .topbar .spacer { flex:1; }
    .btn { background:var(--gold); color:#000; border:none; padding:9px 16px; font-weight:700; font-size:12px; letter-spacing:.08em; text-transform:uppercase; border-radius:3px; cursor:pointer; }
    .btn.secondary { background:#222; color:var(--text); border:1px solid var(--border); }
    .btn.danger { background:#7a2222; color:#fff; }
    .btn:disabled { opacity:.5; cursor:default; }
    .status { font-size:12px; color:var(--muted); }
    .status.ok { color:#6bbf6b; } .status.err { color:#d46a6a; }
    .layout { display:grid; grid-template-columns:260px 1fr; gap:0; height:calc(100vh - 51px); }
    .list { border-right:1px solid var(--border); overflow-y:auto; background:var(--panel); }
    .list-item { display:flex; align-items:center; gap:10px; padding:9px 14px; cursor:pointer; border-bottom:1px solid #1a1a1a; }
    .list-item:hover { background:var(--panel2); }
    .list-item.active { background:#1d1a14; border-left:2px solid var(--gold); }
    .list-thumb { width:34px; height:34px; object-fit:cover; border-radius:3px; background:#222; flex-shrink:0; }
    .list-name { font-size:13px; }
    .list-add { padding:12px 14px; }
    .editor { overflow-y:auto; padding:22px 28px; }
    .editor.empty { display:flex; align-items:center; justify-content:center; color:var(--muted); }
    .field { margin-bottom:16px; }
    .field label { display:block; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
    .field input, .field textarea { width:100%; background:var(--panel2); border:1px solid var(--border); color:var(--text); padding:9px 11px; border-radius:3px; font-family:inherit; font-size:13px; }
    .field textarea { resize:vertical; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .media-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
    .crop-stage { position:relative; width:100%; aspect-ratio:1/1; background:#000; border:1px solid var(--border); overflow:hidden; cursor:crosshair; touch-action:none; user-select:none; border-radius:3px; }
    .crop-stage.banner { aspect-ratio:16/9; }
    .crop-stage img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
    .crop-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:12px; }
    .crop-dot { position:absolute; width:22px; height:22px; border:2px solid #fff; border-radius:50%; background:rgba(200,169,110,.5); box-shadow:0 0 0 2px rgba(0,0,0,.5); transform:translate(-50%,-50%); pointer-events:none; display:none; }
    .media-actions { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
    .upbtn { display:inline-flex; align-items:center; gap:6px; background:var(--gold); color:#000; padding:8px 13px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; border-radius:3px; cursor:pointer; }
    .hint { font-size:11px; color:var(--muted); line-height:1.5; margin:6px 0 0; }
    .gate { position:fixed; inset:0; background:#050505; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; z-index:99; }
    .gate input { background:#0e0e0e; border:1px solid #222; color:#fff; padding:11px 16px; width:240px; text-align:center; letter-spacing:.1em; border-radius:3px; }
    h2.section { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin:26px 0 12px; border-top:1px solid var(--border); padding-top:18px; }
    /* gallery (bucket) */
    .gallery { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:12px; }
    .gallery-item { background:var(--panel2); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
    .gallery-thumb { width:100%; aspect-ratio:1/1; object-fit:cover; background:#000; display:block; }
    .gallery-body { padding:7px; }
    .gallery-badges { display:flex; gap:4px; flex-wrap:wrap; min-height:16px; margin-bottom:6px; }
    .badge { font-size:9px; letter-spacing:.06em; text-transform:uppercase; background:var(--gold); color:#000; padding:1px 5px; border-radius:2px; font-weight:700; }
    .gallery-btns { display:flex; gap:3px; flex-wrap:wrap; }
    .gallery-btns button { flex:1; min-width:40px; background:#222; color:var(--text); border:1px solid var(--border); font-size:10px; padding:4px 2px; border-radius:2px; cursor:pointer; }
    .gallery-btns button.on { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }
    .gallery-btns button.rm { background:#3a1a1a; color:#d98; flex:0 0 auto; }
    .roles { display:grid; grid-template-columns:1fr 1fr; gap:22px; }
    .role-card { background:var(--panel2); border:1px solid var(--border); border-radius:5px; padding:14px; }
    .role-card h3 { margin:0 0 4px; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--text); }
    .role-card .sub { font-size:10px; color:var(--muted); margin-bottom:10px; }
    .role-stage { position:relative; width:100%; background:#000; border:1px solid var(--border); overflow:hidden; cursor:crosshair; touch-action:none; user-select:none; border-radius:3px; }
    .role-stage img { width:100%; height:100%; object-fit:cover; display:block; pointer-events:none; }
    .role-empty { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#555; font-size:11px; text-align:center; padding:10px; }
    .role-dot { position:absolute; width:20px; height:20px; border:2px solid #fff; border-radius:50%; background:rgba(200,169,110,.5); box-shadow:0 0 0 2px rgba(0,0,0,.5); transform:translate(-50%,-50%); pointer-events:none; display:none; }
    .role-ctl { display:flex; align-items:center; gap:8px; margin-top:9px; }
    .role-ctl label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
    .role-ctl input[type=range] { flex:1; }
    .role-ctl .zoomval { font-size:11px; color:var(--text); min-width:34px; text-align:right; }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <img src="/images/logo-mark-white.svg" style="width:46px;opacity:.7" alt="">
    <div style="font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:#555">Artist Manager</div>
    <form id="gateForm" style="display:flex;flex-direction:column;gap:10px;align-items:center">
      <input type="password" id="gatePw" placeholder="Password" autofocus>
      <button class="btn" type="submit" style="width:240px">Enter</button>
      <div id="gateErr" class="status err" style="display:none">Incorrect password</div>
    </form>
  </div>

  <div class="topbar">
    <img src="/images/logo-mark-white.svg" alt="Melankolia">
    <span class="title">Artist Manager</span>
    <span class="spacer"></span>
    <span class="status" id="status"></span>
    <button class="btn secondary" onclick="window.open('/','_blank')">View Site</button>
    <button class="btn" id="saveBtn">Save changes</button>
  </div>

  <div class="layout">
    <div class="list" id="list"></div>
    <div class="editor empty" id="editor">Select an artist to edit, or add a new one.</div>
  </div>

  <script src="/js/admin-artists.js?v=research-disc-sort-v1"></script>
</body>
</html>
